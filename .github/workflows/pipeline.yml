name: TSGstats Pipeline

on:
  # Ручной запуск с параметрами
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Обрабатывать архивы за последние N дней'
        required: false
        default: '7'
      max_per_run:
        description: 'Максимум архивов за один запуск'
        required: false
        default: '20'

  # Автоматически каждые 2 часа
  schedule:
    - cron: '0 */2 * * *'

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DAYS_BACK:            ${{ github.event.inputs.days_back || '7' }}
          MAX_PER_RUN:          ${{ github.event.inputs.max_per_run || '20' }}
        run: python pipeline.py
