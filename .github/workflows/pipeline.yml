name: TSGstats Pipeline

on:
  # Ручной запуск с параметрами
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Обрабатывать архивы за последние N дней'
        required: false
        default: '7'
      max_per_run:
        description: 'Максимум архивов за один запуск'
        required: false
        default: '20'
      servers:
        description: 'Фильтр серверов через запятую (T1,T2,...). Пусто = все серверы.'
        required: false
        default: ''
      mission_types:
        description: 'Фильтр типов миссий через запятую (mTSG,TSG,...). Пусто = все типы.'
        required: false
        default: ''
      min_players:
        description: 'Минимальное кол-во игроков (0 = без ограничения)'
        required: false
        default: '0'
      date_from:
        description: 'Дата от (YYYY-MM-DD). Если задана — заменяет days_back как нижнюю границу.'
        required: false
        default: ''
      date_to:
        description: 'Дата до (YYYY-MM-DD, включительно). Верхняя граница диапазона.'
        required: false
        default: ''

  # Автоматически каждые 2 часа
  schedule:
    - cron: '0 */2 * * *'

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DAYS_BACK:            ${{ github.event.inputs.days_back || '7' }}
          MAX_PER_RUN:          ${{ github.event.inputs.max_per_run || '20' }}
          FILTER_SERVERS:       ${{ github.event.inputs.servers || '' }}
          FILTER_TYPES:         ${{ github.event.inputs.mission_types || '' }}
          FILTER_MIN_PLAYERS:   ${{ github.event.inputs.min_players || '0' }}
          FILTER_DATE_FROM:     ${{ github.event.inputs.date_from || '' }}
          FILTER_DATE_TO:       ${{ github.event.inputs.date_to || '' }}
        run: python pipeline.py
